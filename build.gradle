plugins {
    id "java"
    id "application"
}

group = "com.aiusage"
version = "1.0.0"

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "com.fasterxml.jackson.core:jackson-databind:2.17.2"
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.2"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.3"
    testRuntimeOnly "org.junit.platform:junit-platform-console:1.10.3"
    testImplementation "org.mockito:mockito-core:5.11.0"
    testImplementation "org.mockito:mockito-junit-jupiter:5.11.0"
}

application {
    mainClass = "com.aiusage.App"
    applicationDefaultJvmArgs = [
        "--add-modules", "javafx.controls,javafx.fxml",
        "--add-exports", "javafx.graphics/com.sun.glass.ui=ALL-UNNAMED"
    ]
}

// Default test task disabled because Gradle test worker's @argfile
// corrupts non-ASCII path characters ("Programação") on Windows.
// Use runTests instead (uses JavaExec with direct -cp).
tasks.named("test", Test) {
    useJUnitPlatform()
    enabled = false
}

// Custom test runner that bypasses the @argfile encoding issue
tasks.register("runTests", JavaExec) {
    dependsOn compileTestJava
    group = "Verification"
    description = "Run tests using JUnit ConsoleLauncher"

    classpath = sourceSets.main.runtimeClasspath + sourceSets.test.runtimeClasspath
    mainClass = "org.junit.platform.console.ConsoleLauncher"
    args("--select-package", "com.aiusage")
    ignoreExitValue = true
}
