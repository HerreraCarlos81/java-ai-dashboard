<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8a6a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="20" y="20" width="360" height="360" rx="30" ry="30" fill="url(#bg)" stroke="#0f3460" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">AI Dashboard</text>

  <!-- Bar chart -->
  <rect x="80" y="180" width="60" height="140" rx="6" ry="6" fill="url(#bar1)" opacity="0.9"/>
  <rect x="170" y="120" width="60" height="200" rx="6" ry="6" fill="url(#bar2)" opacity="0.9"/>
  <rect x="260" y="80" width="60" height="240" rx="6" ry="6" fill="url(#bar3)" opacity="0.9"/>

  <!-- Chart line -->
  <polyline points="80,200 140,170 170,160 230,130 260,110 320,85"
    fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data dots -->
  <circle cx="80" cy="200" r="5" fill="#e94560"/>
  <circle cx="170" cy="160" r="5" fill="#e94560"/>
  <circle cx="260" cy="110" r="5" fill="#e94560"/>

  <!-- Bottom labels -->
  <text x="110" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">OpenAI</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">Anthropic</text>
  <text x="290" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">Azure</text>

  <!-- Dollar sign -->
  <text x="365" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="20" fill="#10a37f">$</text>
</svg>
